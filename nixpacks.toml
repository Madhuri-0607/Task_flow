[phases.setup]
nixPkgs = ["python311", "gcc", "libpq", "pkg-config"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
# Run database initialization during build
cmds = ["python init_db.py || true"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --worker-class sync --worker-connections 1000 --timeout 120 --access-logfile - --error-logfile - --log-level info"

[env]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
